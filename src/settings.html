<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro settings</title>
  <style>
    :root{
      --bg: #0f0f10;
      --panel: #141416;
      --panel2: #101012;
      --text: #f2f2f2;
      --muted: #a3a3a3;
      --faint: #6e6e6e;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.14);
      --hover: rgba(255,255,255,0.06);
      --focus: rgba(255,255,255,0.22);
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body{
      margin:0;
      padding:16px 16px 14px;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Arial, sans-serif;
      font-size:13px;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #0b0b0c);
      color-scheme: dark;
      overflow: hidden; /* keep scrollbars on the card for consistent styling */
    }

    /* --- Scrollbars (Chromium/Electron) --- */
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0);
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.22);
      background-clip: padding-box;
    }

    .wrap{
      background: rgba(20,20,22,0.86);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 12px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
      height: 100%;
      overflow: auto;
    }

    h1{
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    h2{
      margin: 14px 0 8px;
      font-size: 11px;
      font-weight: 650;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    .field{ margin-bottom: 10px; }
    label{
      display:block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="number"]{
      width:100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(16,16,18,0.9);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s ease, background .15s ease;
    }
    input[type="number"]:hover{ border-color: var(--border2); }
    input[type="number"]:focus{
      border-color: var(--focus);
      background: rgba(18,18,20,0.95);
    }

    .checkbox-field{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(16,16,18,0.75);
    }
    .checkbox-field:hover{ background: rgba(16,16,18,0.9); border-color: var(--border2); }
    .checkbox-field input[type="checkbox"]{
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: #ffffff;
    }
    .checkbox-field label{
      margin:0;
      color: var(--text);
      font-size: 12.5px;
      line-height: 1.3;
      cursor: pointer;
    }

    .hint{
      margin-top: 6px;
      font-size: 11px;
      color: var(--faint);
      line-height: 1.35;
    }

    .actions{
      display:flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    button{
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: rgba(16,16,18,0.85);
      color: var(--text);
      cursor: pointer;
      transition: transform .04s ease, background .12s ease, border-color .12s ease;
    }
    button:hover{ background: rgba(255,255,255,0.06); border-color: var(--border2); }
    button:active{ transform: translateY(1px); }
    button.primary{
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.10);
    }
    button.primary:hover{ background: rgba(255,255,255,0.14); }

    .err{
      color: #f1b3b3;
      font-size: 12px;
      margin-top: 10px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Settings</h1>

    <h2>Pomodoro</h2>
    <div class="field">
      <label for="work">Focus (minutes)</label>
      <input id="work" type="number" min="1" max="180" step="1" />
      <div class="hint">Length of each focus session.</div>
    </div>
    <div class="field">
      <label for="shortBreak">Short break (minutes)</label>
      <input id="shortBreak" type="number" min="1" max="120" step="1" />
      <div class="hint">Used after most sessions.</div>
    </div>
    <div class="field">
      <label for="longBreak">Long break (minutes)</label>
      <input id="longBreak" type="number" min="1" max="120" step="1" />
      <div class="hint">Used every 4th break.</div>
    </div>

    <h2>Appearance</h2>
    <div class="checkbox-field">
      <input type="checkbox" id="flipHorizontal" />
      <div>
        <label for="flipHorizontal">Flip character horizontally</label>
        <div class="hint">Mirrors the penguin and sleep “zZzZzZ”.</div>
      </div>
    </div>

    <h2>Sound</h2>
    <div class="checkbox-field">
      <input type="checkbox" id="soundEnabled" />
      <div>
        <label for="soundEnabled">Enable alert sounds</label>
        <div class="hint">Pomodoro rings 3 times. Notes/timers loop until dismissed.</div>
      </div>
    </div>

    <h2>Idle &amp; sleep</h2>
    <div class="field">
      <label for="sleepMinutes">Sleep after (minutes)</label>
      <input id="sleepMinutes" type="number" min="1" max="60" step="1" />
      <div class="hint">No keypresses for this long → penguin falls asleep.</div>
    </div>

    <div id="err" class="err"></div>
    <div class="actions">
      <button type="button" id="cancel">Cancel</button>
      <button type="button" class="primary" id="save">Save</button>
    </div>
  </div>
  <script type="module" src="settings-renderer.js"></script>
</body>
</html>
