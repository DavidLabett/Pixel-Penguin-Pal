<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 128px;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      cursor: default;
    }

    body {
      position: relative;
    }

    /* --- Note alert overlay — sits at the top of the window, above the content --- */
    #note-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 110px;
      z-index: 10;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
      padding: 8px;
      background: rgba(10, 10, 16, 0.93);
      border-radius: 0 0 6px 6px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.18) transparent;
    }
    #note-overlay.active { display: flex; }

    #note-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      line-height: 1.5;
      color: #e8e8e8;
      word-break: break-word;
      flex: 1;
      overflow-y: auto;
    }

    #note-dismiss {
      align-self: flex-end;
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #aa2222;
      color: #fff;
      font-size: 15px;
      line-height: 1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    #note-dismiss:hover { background: #cc2a2a; }

    /* --- Content wrapper — always pinned to the bottom of the window --- */
    #content-wrapper {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Timer bar --- */
    #timer-bar {
      width: 128px;
      flex: 0 0 auto;
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px 2px;
    }

    #timer-label {
      font-family: 'Segoe UI', monospace, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.1;
      color: #fff;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 6px;
      padding: 3px 10px;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.85);
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 124px;
    }
    #timer-label.label-text {
      font-size: 12px;
      letter-spacing: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #timer-label.visible { opacity: 1; }

    /* --- Sprite wrapper + overlays --- */
    #sprite-wrapper {
      position: relative;
      width: 128px;
      height: 128px;
      flex: 0 0 128px;
    }
    #sprite-wrapper.flipped {
      transform: scaleX(-1);
      transform-origin: center center;
    }

    #sprite-canvas {
      display: block;
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
    }

    /* --- zZzZzZ sleep overlay --- */
    #zzz-overlay {
      position: absolute;
      bottom: 28px;
      right: 6px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
      display: none; /* animation is only attached when .visible, so keyframes can't bleed through */
    }
    #zzz-overlay.visible {
      display: block;
      animation: zzz 2.5s ease-in-out infinite;
    }

    @keyframes zzz {
      0%,  100% { transform: translateY(0);    opacity: 0.35; }
      50%        { transform: translateY(-7px); opacity: 1;    }
    }
  </style>
</head>
<body>
  <div id="note-overlay">
    <p id="note-text"></p>
    <button id="note-dismiss" title="Dismiss">&#x2715;</button>
  </div>
  <div id="content-wrapper">
    <div id="timer-bar">
      <span id="timer-label">25:00</span>
    </div>
    <div id="sprite-wrapper">
      <canvas id="sprite-canvas"></canvas>
      <div id="zzz-overlay" aria-hidden="true">zZzZzZ</div>
    </div>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
