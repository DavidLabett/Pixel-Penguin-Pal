<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    :root{
      --bg: #0f0f10;
      --panel: rgba(20,20,22,0.86);
      --panel2: rgba(16,16,18,0.85);
      --text: #f2f2f2;
      --muted: #a3a3a3;
      --faint: #6e6e6e;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.14);
      --hover: rgba(255,255,255,0.06);
      --focus: rgba(255,255,255,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #0b0b0c);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      color-scheme: dark;
    }

    /* --- Scrollbars (Chromium/Electron) --- */
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
    }
    *::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0); /* keeps thumb from feeling too thick */
      background-clip: padding-box;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.22);
      background-clip: padding-box;
    }

    header {
      padding: 14px 16px 12px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.2px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(0,0,0,0.12);
      backdrop-filter: blur(10px);
    }

    /* --- Notes list --- */
    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 12px;
    }

    .note-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.40);
    }

    .note-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .note-preview {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .note-timer-desc {
      font-size: 11px;
      color: var(--faint);
    }

    .note-actions button {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(16,16,18,0.85);
      color: var(--text);
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease, transform .04s ease;
    }

    .note-actions button:hover { background: var(--hover); border-color: var(--border2); }
    .note-actions button:active { transform: translateY(1px); }
    .btn-delete { color: #f1b3b3; }

    .empty-state {
      color: var(--faint);
      text-align: center;
      padding: 28px 0;
    }

    /* --- Form panel --- */
    #form-panel {
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.18);
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    #form-toggle-bar {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #btn-new-note {
      background: rgba(255,255,255,0.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 12px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease, transform .04s ease;
    }
    #btn-new-note:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.26); }
    #btn-new-note:active { transform: translateY(1px); }

    #note-form {
      padding: 0 14px 14px;
    }

    .field { margin-bottom: 10px; }
    .field label { display: block; color: var(--muted); margin-bottom: 6px; font-size: 12px; }

    textarea, input[type="datetime-local"], input[type="time"], select {
      width: 100%;
      padding: 9px 10px;
      background: rgba(16,16,18,0.90);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: background .12s ease, border-color .12s ease;
    }
    textarea { resize: vertical; min-height: 60px; }
    textarea:hover, input:hover, select:hover { border-color: var(--border2); }
    textarea:focus, input:focus, select:focus { border-color: var(--focus); background: rgba(18,18,20,0.95); }

    /* Date/time pickers: use a slightly lighter field so the native icon is visible */
    input[type="datetime-local"],
    input[type="time"] {
      background: rgba(42,42,46,0.92);
    }
    input[type="datetime-local"]:focus,
    input[type="time"]:focus {
      background: rgba(48,48,54,0.94);
    }

    /* Try not to fight the native icon color; keep it mostly default */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: none;
      opacity: 0.85;
      cursor: pointer;
    }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover,
    input[type="time"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    /* Ensure internal date/time UI stays dark-themed where supported */
    input[type="datetime-local"],
    input[type="time"] { color-scheme: dark; }

    #day-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      margin-top: 4px;
    }
    #day-checkboxes label {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }
    input[type="checkbox"] { cursor: pointer; }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn-secondary, .btn-primary {
      border: 1px solid var(--border);
      background: rgba(16,16,18,0.85);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background .12s ease, border-color .12s ease, transform .04s ease;
    }
    .btn-primary { border-color: rgba(255,255,255,0.20); background: rgba(255,255,255,0.10); }
    .btn-secondary:hover, .btn-primary:hover { background: var(--hover); border-color: var(--border2); }
    .btn-secondary:active, .btn-primary:active { transform: translateY(1px); }

    .err { color: #f1b3b3; font-size: 12px; min-height: 1.1em; margin-top: 8px; }
  </style>
</head>
<body>
  <header>Notes</header>

  <div id="notes-list">
    <p class="empty-state" id="empty-msg">No notes yet. Add one below.</p>
  </div>

  <div id="form-panel">
    <div id="form-toggle-bar">
      <button id="btn-new-note">+ New note</button>
    </div>

    <form id="note-form" hidden>
      <div class="field">
        <label for="note-text-input">Note</label>
        <textarea id="note-text-input" placeholder="What do you want to be reminded of?"></textarea>
      </div>

      <div class="field">
        <label for="timer-type">Timer</label>
        <select id="timer-type">
          <option value="none">No timer</option>
          <option value="once">Once — specific date &amp; time</option>
          <option value="recurring">Recurring — weekly schedule</option>
        </select>
      </div>

      <div id="once-fields" class="field" hidden>
        <label for="once-datetime">Date &amp; time</label>
        <input type="datetime-local" id="once-datetime" />
      </div>

      <div id="recurring-fields" class="field" hidden>
        <label>Days</label>
        <div id="day-checkboxes">
          <label><input type="checkbox" name="day" value="1" /> Mon</label>
          <label><input type="checkbox" name="day" value="2" /> Tue</label>
          <label><input type="checkbox" name="day" value="3" /> Wed</label>
          <label><input type="checkbox" name="day" value="4" /> Thu</label>
          <label><input type="checkbox" name="day" value="5" /> Fri</label>
          <label><input type="checkbox" name="day" value="6" /> Sat</label>
          <label><input type="checkbox" name="day" value="0" /> Sun</label>
        </div>
        <label style="margin-top:8px; display:block;" for="recurring-time">Time</label>
        <input type="time" id="recurring-time" />
      </div>

      <div class="err" id="form-err"></div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel-note">Cancel</button>
        <button type="submit" class="btn-primary"   id="btn-save-note">Save</button>
      </div>
    </form>
  </div>

  <script type="module" src="notes-renderer.js"></script>
</body>
</html>
