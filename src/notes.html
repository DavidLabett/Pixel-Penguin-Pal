<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #e8e8e8;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 12px 16px 10px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    /* --- Notes list --- */
    #notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .note-card {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .note-card-top {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .note-preview {
      flex: 1;
      font-size: 13px;
      color: #e0e0e0;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .note-timer-desc {
      font-size: 11px;
      color: #888;
    }

    .note-actions button {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
    }

    .btn-edit   { background: #3c3c3c; color: #ccc; }
    .btn-delete { background: #6e2020; color: #fcc; }
    .btn-edit:hover   { background: #4a4a4a; }
    .btn-delete:hover { background: #8a2a2a; }

    .empty-state {
      color: #666;
      text-align: center;
      padding: 24px 0;
    }

    /* --- Form panel --- */
    #form-panel {
      border-top: 1px solid #333;
      background: #222;
      flex-shrink: 0;
    }

    #form-toggle-bar {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #btn-new-note {
      background: #0e639c;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    #btn-new-note:hover { background: #1177bb; }

    #note-form {
      padding: 0 14px 12px;
    }

    .field { margin-bottom: 10px; }
    .field label { display: block; color: #b0b0b0; margin-bottom: 3px; }

    textarea, input[type="datetime-local"], input[type="time"], select {
      width: 100%;
      padding: 7px 9px;
      background: #2d2d2d;
      border: 1px solid #3c3c3c;
      border-radius: 5px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #5a9fd4; }

    #day-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      margin-top: 4px;
    }
    #day-checkboxes label {
      display: flex;
      align-items: center;
      gap: 3px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
    }
    input[type="checkbox"] { cursor: pointer; }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn-secondary { background: #3c3c3c; color: #e8e8e8; border: none; border-radius: 5px; padding: 7px 14px; cursor: pointer; }
    .btn-primary   { background: #0e639c; color: #fff;    border: none; border-radius: 5px; padding: 7px 14px; cursor: pointer; }
    .btn-secondary:hover { filter: brightness(1.1); }
    .btn-primary:hover   { filter: brightness(1.1); }

    .err { color: #f48771; font-size: 12px; min-height: 1.1em; margin-top: 6px; }
  </style>
</head>
<body>
  <header>Notes</header>

  <div id="notes-list">
    <p class="empty-state" id="empty-msg">No notes yet. Add one below.</p>
  </div>

  <div id="form-panel">
    <div id="form-toggle-bar">
      <button id="btn-new-note">+ New note</button>
    </div>

    <form id="note-form" hidden>
      <div class="field">
        <label for="note-text-input">Note</label>
        <textarea id="note-text-input" placeholder="What do you want to be reminded of?"></textarea>
      </div>

      <div class="field">
        <label for="timer-type">Timer</label>
        <select id="timer-type">
          <option value="none">No timer</option>
          <option value="once">Once — specific date &amp; time</option>
          <option value="recurring">Recurring — weekly schedule</option>
        </select>
      </div>

      <div id="once-fields" class="field" hidden>
        <label for="once-datetime">Date &amp; time</label>
        <input type="datetime-local" id="once-datetime" />
      </div>

      <div id="recurring-fields" class="field" hidden>
        <label>Days</label>
        <div id="day-checkboxes">
          <label><input type="checkbox" name="day" value="1" /> Mon</label>
          <label><input type="checkbox" name="day" value="2" /> Tue</label>
          <label><input type="checkbox" name="day" value="3" /> Wed</label>
          <label><input type="checkbox" name="day" value="4" /> Thu</label>
          <label><input type="checkbox" name="day" value="5" /> Fri</label>
          <label><input type="checkbox" name="day" value="6" /> Sat</label>
          <label><input type="checkbox" name="day" value="0" /> Sun</label>
        </div>
        <label style="margin-top:8px; display:block;" for="recurring-time">Time</label>
        <input type="time" id="recurring-time" />
      </div>

      <div class="err" id="form-err"></div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel-note">Cancel</button>
        <button type="submit" class="btn-primary"   id="btn-save-note">Save</button>
      </div>
    </form>
  </div>

  <script type="module" src="notes-renderer.js"></script>
</body>
</html>
